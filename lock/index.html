<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Sign in — reitrn Warehouse</title>
<style>
  :root { --teal:#00B89A; --ink:#111118; --slate:#6B6B82; --panel:#F0F0F5; --border:#ECECF1; --alert:#E8334A; }
  * { box-sizing: border-box; }
  body { margin:0; height:100vh; display:flex; align-items:center; justify-content:center;
    font-family:Inter,system-ui,sans-serif; background:#F7F7F9; color:var(--ink); }
  .card { width:340px; text-align:center; }
  .wordmark { font-weight:900; font-size:44px; letter-spacing:-.02em; margin-bottom:18px; line-height:1; }
  .wordmark .g { background:linear-gradient(90deg,#00B89A 0%,#000 100%); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .sub { font-size:12px; color:var(--slate); margin-bottom:22px; }
  .station { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.12em; color:var(--slate); margin-bottom:18px; }
  .station b { color:var(--ink); }
  input { width:100%; text-align:center; font-size:30px; letter-spacing:.4em; font-weight:800;
    padding:14px; border:2px solid var(--border); border-radius:14px; outline:none; background:#fff; color:var(--ink); }
  input:focus { border-color:var(--teal); }
  .hint { font-size:12px; color:var(--slate); margin-top:12px; }
  .err { font-size:13px; font-weight:700; color:var(--alert); margin-top:12px; min-height:18px; }
  .pad { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:16px; }
  .pad button { padding:14px 0; font-size:18px; font-weight:700; border:1px solid var(--border); border-radius:12px;
    background:#fff; color:var(--ink); cursor:pointer; }
  .pad button:active { background:var(--panel); }
  .pad .wide { grid-column:span 1; }
  .enter { background:var(--ink); color:#fff; border:none; }
</style>
</head>
<body>
  <div class="card">
    <div class="wordmark"><span class="g">reitrn</span><span class="dot">.</span></div>
    <div class="sub">Warehouse station</div>
    <div class="station" id="station">Station</div>
    <input id="pin" type="password" inputmode="numeric" autocomplete="off" autofocus placeholder="••••" />
    <div class="err" id="err"></div>
    <div class="hint">Enter your PIN, or scan your ID card.</div>
  </div>
<script>
  // The living gradient — wordmark colour shifts every week (mirror of
  // reitrn-www/living-gradient.js). Standalone here because the lock screen is the
  // Electron app's own HTML, not portal web content.
  (function(){
    var A=['#C21460','#8601AF','#4424D6','#0247FE','#347C98','#66B032','#B2D732','#FEFE33','#FABC02','#FB9902','#FD5308','#FE2712'];
    function h2r(h){h=h.replace('#','');return[parseInt(h.substr(0,2),16),parseInt(h.substr(2,2),16),parseInt(h.substr(4,2),16)];}
    function r2hsl(r,g,b){r/=255;g/=255;b/=255;var mx=Math.max(r,g,b),mn=Math.min(r,g,b),d=mx-mn,h=0,s=0,l=(mx+mn)/2;if(d){s=l>0.5?d/(2-mx-mn):d/(mx+mn);if(mx===r)h=((g-b)/d+(g<b?6:0));else if(mx===g)h=((b-r)/d+2);else h=((r-g)/d+4);h*=60;}return{h:h,s:s,l:l};}
    function hsl2hex(h,s,l){h=(h%360+360)%360;s=Math.max(0,Math.min(1,s));l=Math.max(0,Math.min(1,l));var c=(1-Math.abs(2*l-1))*s,x=c*(1-Math.abs((h/60)%2-1)),m=l-c/2,r,g,b;if(h<60){r=c;g=x;b=0;}else if(h<120){r=x;g=c;b=0;}else if(h<180){r=0;g=c;b=x;}else if(h<240){r=0;g=x;b=c;}else if(h<300){r=x;g=0;b=c;}else{r=c;g=0;b=x;}function t(v){v=Math.round((v+m)*255);return('0'+v.toString(16)).slice(-2);}return('#'+t(r)+t(g)+t(b)).toUpperCase();}
    function lerpH(a,b,t){var d=b-a;if(d>180)d-=360;if(d<-180)d+=360;return a+d*t;}
    function rgblerp(a,b,t){function p(v){return('0'+Math.round(v).toString(16)).slice(-2);}return('#'+p(a[0]+(b[0]-a[0])*t)+p(a[1]+(b[1]-a[1])*t)+p(a[2]+(b[2]-a[2])*t)).toUpperCase();}
    var HSL=A.map(function(a){var r=h2r(a);return r2hsl(r[0],r[1],r[2]);});
    function baseHsl(frac){var pos=frac*12,i=Math.floor(pos),t=pos-i;i=((i%12)+12)%12;var j=(i+1)%12,X=HSL[i],Y=HSL[j];return{h:lerpH(X.h,Y.h,t),s:X.s+(Y.s-X.s)*t,l:X.l+(Y.l-X.l)*t};}
    var DR=[254,39,18],DT=[0,184,154],DW=[];for(var k=0;k<52;k++){if(Math.floor(k/52*12)===11)DW.push(k);}
    function week(w){if(Math.floor(w/52*12)===11){var i=DW.indexOf(w),n=DW.length;return{s:rgblerp(DR,DT,i/n),e:rgblerp(DR,DT,(i+1)/n)};}var b=baseHsl((w+0.5)/52);return{s:hsl2hex(b.h-14,b.s,b.l+0.10),e:hsl2hex(b.h+14,b.s,b.l-0.10)};}
    var d=new Date(),s0=new Date(d.getFullYear(),0,1),w=Math.max(0,Math.min(51,Math.floor((d-s0)/(7*86400000))));
    var g=week(w),el=document.querySelector('.wordmark .g'),dot=document.querySelector('.wordmark .dot');
    if(el)el.style.backgroundImage='linear-gradient(90deg,'+g.s+','+g.e+')';
    if(dot)dot.style.color=g.e;
  })();

  const pin = document.getElementById('pin');
  const err = document.getElementById('err');

  window.lock.station().then((s) => {
    document.getElementById('station').innerHTML = 'Station · <b>' + (s || '—') + '</b>';
  });

  let busy = false;
  async function submit() {
    const value = pin.value.trim();
    if (!value || busy) return;
    busy = true; err.textContent = '';
    const res = await window.lock.submit(value);
    busy = false;
    if (res && res.ok) return; // main process reveals the warehouse + closes this window
    pin.value = '';
    err.textContent = (res && res.error) || 'Not recognised';
    pin.focus();
  }

  // A keyboard-wedge scanner types the token then presses Enter — same path.
  pin.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); submit(); } });
</script>
</body>
</html>
